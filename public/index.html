<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playwright 研修フロー | スタート</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="card">
      <p class="step-label">STEP 0 / 4</p>
      <h1>Playwright 研修フロー</h1>
      <p class="lead">
        1 画面に 1 要素だけ。「次へ」で進み、ラジオの選択で分岐して
        ゴールに辿り着きます。スクリプトを書く練習に使ってください。
      </p>
      <button data-testid="start">スタート</button>
    </div>

    <script>
      // 前回の入力が残らないよう、開始時にリセットしておく
      sessionStorage.clear()
      document.querySelector('[data-testid="start"]').addEventListener('click', () => {
        window.location.href = 'steps/name.html'
      })
    </script>
  </body>
</html>
