<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playwright 研修サイト | ログイン</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <h1 data-testid="page-title">ログイン</h1>
    </header>
    <nav data-testid="main-nav" data-depth="sub"></nav>

    <main>
      <section>
        <h2>ログインフォーム</h2>
        <p>
          正しい認証情報: ユーザー名 <code>admin</code> / パスワード <code>password123</code>
        </p>
        <form data-testid="login-form">
          <label for="username">ユーザー名</label>
          <input type="text" id="username" name="username" data-testid="username" />

          <label for="password">パスワード</label>
          <input type="password" id="password" name="password" data-testid="password" />

          <button type="submit" data-testid="login-submit">ログイン</button>
        </form>

        <div class="result hidden" data-testid="login-success">
          ✅ ログイン成功！ようこそ、<span data-testid="welcome-name"></span> さん。
        </div>
        <div class="result hidden" data-testid="login-error">
          ❌ ユーザー名またはパスワードが正しくありません。
        </div>
      </section>
    </main>

    <footer>Playwright 研修用</footer>

    <script src="../js/nav.js"></script>
    <script>
      const VALID = { username: 'admin', password: 'password123' }

      const form = document.querySelector('[data-testid="login-form"]')
      const success = document.querySelector('[data-testid="login-success"]')
      const error = document.querySelector('[data-testid="login-error"]')
      const welcomeName = document.querySelector('[data-testid="welcome-name"]')

      form.addEventListener('submit', (event) => {
        event.preventDefault()
        const data = new FormData(form)
        const username = data.get('username')
        const password = data.get('password')

        const isValid = username === VALID.username && password === VALID.password

        if (isValid) {
          welcomeName.textContent = username
          success.classList.remove('hidden')
          error.classList.add('hidden')
        } else {
          error.classList.remove('hidden')
          success.classList.add('hidden')
        }
      })
    </script>
  </body>
</html>
